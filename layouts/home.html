{{ define "main" }}
<section>
  {{ .Content }}
  
  {{ $posts := where .Site.RegularPages "Section" "blog" }}
  {{ range $posts }}
  <article>
    <h3><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a>{{ if not .Date.IsZero }} — <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>{{ end }}</h3>
  </article>
  {{ end }}
</section>
{{ end }}
