<!DOCTYPE html>
<html lang="en">

  <link rel="icon" href="{{ "assets/favicon.ico" | relURL }}">

<body>

    <h1><a href="/">{{ .Site.Title }}</a></h1>
    <nav>
      <a href="https://github.com/jacobwiseberg">GitHub</a> | 
      <a href="mailto:jake@shift1w.com">jake@shift1w.com</a> | 
      <a href="{{ "assets/a577fd22b70dbd624d53863520ee598580f2bc024586ea7b0f1d50652f733d1c.asc" | relURL }}">PGP</a> | 
      <a href="{{ "blog.xml" | relURL }}">RSS</a>

  <footer>
    <p>&copy; 2025-{{ now.Year }} {{ .Site.Params.author }}. All rights reserved.</p>
  </footer>
</body>
</html>
